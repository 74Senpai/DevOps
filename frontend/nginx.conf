server {
    listen 80;

    # Frontend (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # =====================
    # Proxy API NodeJS
    # =====================

    location /api-node/ {
        proxy_pass http://node-api:3000/api-node/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /about {
        proxy_pass http://node-api:3000/about;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://node-api:3000/health;
        proxy_set_header Host $host;
    }

    location /students {
        proxy_pass http://node-api:3000/students;
        proxy_set_header Host $host;
    }
}